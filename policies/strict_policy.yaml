# Stricter labels and outbound rules
tool_labels:
  filesystem: { confidentiality: SECRET, integrity: HIGH }
  database: { confidentiality: SECRET, integrity: HIGH }
  web_fetch: { confidentiality: PUBLIC, integrity: LOW }
  email: { confidentiality: INTERNAL, integrity: MEDIUM }

rules:
  - name: block-internal-plus-to-web
    source_tools: ["*"]
    dest_tools: ["web_fetch"]
    min_confidentiality: INTERNAL
    action: BLOCK

  - name: block-confidential-plus-to-email
    source_tools: ["*"]
    dest_tools: ["email"]
    min_confidentiality: CONFIDENTIAL
    action: BLOCK

  - name: block-from-web-fetch-tool
    source_tools: ["web_fetch"]
    dest_tools: ["*"]
    action: BLOCK

  - name: allow-public-low-to-web-fetch
    source_tools: ["*"]
    dest_tools: ["web_fetch"]
    max_confidentiality: PUBLIC
    max_integrity: LOW
    action: ALLOW

  - name: allow-to-email
    source_tools: ["*"]
    dest_tools: ["email"]
    max_confidentiality: INTERNAL
    min_integrity: MEDIUM
    action: ALLOW

  - name: allow-to-store
    source_tools: ["*"]
    dest_tools: ["filesystem", "database"]
    max_confidentiality: SECRET
    min_integrity: HIGH
    action: ALLOW
